<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Size Chart</title>
  
</head>
<body>

  <h2>Size Chart</h2>

  <table>
    <thead>
      <tr>
        <th>Size</th>
        <th>Chest (in)</th>
        <th>Waist (in)</th>
        <th>Hip (in)</th>
        <th>Front Length (in)</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>XS</td>
        <td>32</td>
        <td>26</td>
        <td>35</td>
        <td>25</td>
      </tr>
      <tr>
        <td>S</td>
        <td>34</td>
        <td>28</td>
        <td>37</td>
        <td>25.5</td>
      </tr>
      <tr>
        <td>M</td>
        <td>36</td>
        <td>30</td>
        <td>39</td>
        <td>26</td>
      </tr>
      <tr>
        <td>L</td>
        <td>38</td>
        <td>32</td>
        <td>41</td>
        <td>26.5</td>
      </tr>
      <tr>
        <td>XL</td>
        <td>40</td>
        <td>34</td>
        <td>43</td>
        <td>27</td>
      </tr>
      <tr>
        <td>XXL</td>
        <td>42</td>
        <td>36</td>
        <td>45</td>
        <td>27.5</td>
      </tr>
    </tbody>
  </table>

</body>
</html>
