<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Size Chart</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
      background: #f5f5f5;
    }

    h2 {
      font-size: 18px;
      color: #333;
      margin-bottom: 16px;
      border-bottom: 2px solid #ff3f6c;
      padding-bottom: 8px;
      display: inline-block;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      max-width: 700px;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    thead tr {
      background-color: #ff3f6c;
      color: #fff;
    }

    thead th {
      padding: 12px 16px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid #e0e0e0;
    }

    tbody tr:nth-child(even) {
      background-color: #fff0f3;
    }

    tbody tr:hover {
      background-color: #ffe0e8;
    }

    tbody td {
      padding: 10px 16px;
      text-align: center;
      font-size: 13px;
      color: #333;
      border: 1px solid #e0e0e0;
    }

    tbody td:first-child {
      font-weight: 600;
      color: #ff3f6c;
      background: #fff5f7;
    }
  </style>
</head>
<body>

  <h1>Size Chart</h1>

  <table>
    <thead>
      <tr>
        <th>Size</th>
        <th>Chest (in)</th>
        <th>Waist (in)</th>
        <th>Hip (in)</th>
        <th>Front Length (in)</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>XS</td>
        <td>32</td>
        <td>26</td>
        <td>35</td>
        <td>25</td>
      </tr>
      <tr>
        <td>S</td>
        <td>34</td>
        <td>28</td>
        <td>37</td>
        <td>25.5</td>
      </tr>
      <tr>
        <td>M</td>
        <td>36</td>
        <td>30</td>
        <td>39</td>
        <td>26</td>
      </tr>
      <tr>
        <td>L</td>
        <td>38</td>
        <td>32</td>
        <td>41</td>
        <td>26.5</td>
      </tr>
      <tr>
        <td>XL</td>
        <td>40</td>
        <td>34</td>
        <td>43</td>
        <td>27</td>
      </tr>
      <tr>
        <td>XXL</td>
        <td>42</td>
        <td>36</td>
        <td>45</td>
        <td>27.5</td>
      </tr>
    </tbody>
  </table>

</body>
</html>
